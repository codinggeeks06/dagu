init:
  - name: pkginfo

webpack: &webpack
  common:
    disabled: true
  publicPath: /
  chunkFilename: ./js/chunks/[chunkhash].js
  entry: 
    example/(0): ./example/*.tsx
    bundle: ./src/index.ts
    workers/editor.worker: ./node_modules/monaco-editor/esm/vs/editor/editor.worker.js
    workers/(0).worker: ./node_modules/monaco-editor/esm/vs/language/*/*.worker.js
  babel:
    modules: false
  umd:
    library: ['MonacoReact']
    libraryTarget: 'umd'
    umdNamedDefine: true

dev:
  - name: clean
  - name: typescript
  - name: webpack
    <<: *webpack
    template: ./assets/*.html
    mode: development
    compress: false
    watch: true
  - name: server
    port: 7009
  - name: browser-sync

build:
  - name: clean
  - name: typescript
  - name: webpack
    <<: *webpack
    sourceMap: false
    mode: production
  - name: ./public-path.js
    
test:
  - name: lint

publish:
  - name: alicdn-publish
    build:
      name: shell
      script:
        - dn test
        - dn build -e prod
  - name: alicdn-check
  - name: shell
    script:
      - npm pu